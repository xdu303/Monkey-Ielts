<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{padding:1.25rem 0}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.ttl{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.sb{display:flex;gap:4px;flex-wrap:wrap}
.bk{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500;cursor:default}
.ok{background:var(--color-background-success);color:var(--color-text-success)}
.hint{font-size:13px;color:var(--color-text-secondary);margin-bottom:.875rem;line-height:1.6}
.exs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.ex{font-size:12px;padding:3px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:99px;background:transparent;cursor:pointer;color:var(--color-text-secondary)}
.ex:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.qa{display:flex;gap:8px;margin-bottom:1rem}
#qi{flex:1;padding:10px 12px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);resize:vertical;min-height:68px;font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);line-height:1.5}
#qi:focus{outline:none;border-color:var(--color-border-primary)}
.abtn{padding:8px 16px;border:0.5px solid transparent;background:var(--color-text-primary);color:var(--color-background-primary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;align-self:flex-start}
.abtn:hover{opacity:.85}.abtn:disabled{opacity:.4;cursor:not-allowed}
.ans{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;background:var(--color-background-primary)}
.meta{font-size:12px;color:var(--color-text-tertiary);margin-bottom:.75rem}
.txt{font-size:14px;line-height:1.8;color:var(--color-text-primary);white-space:pre-wrap}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:.75rem;padding-top:.75rem;border-top:0.5px solid var(--color-border-tertiary)}
.chip{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--color-background-info);color:var(--color-text-info)}
.notice{font-size:12px;padding:7px 11px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);color:var(--color-text-secondary);margin-bottom:.875rem}
@keyframes sp{to{transform:rotate(360deg)}}
.sp{width:13px;height:13px;border:2px solid var(--color-border-secondary);border-top-color:var(--color-text-primary);border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
</style>

let IDX = null;

async function loadIndex() {
  try {
    // Try storage first
    const stored = await window.storage.get('ielts_idx_v2');
    if (stored) {
      IDX = JSON.parse(stored.value);
      document.getElementById('notice').textContent = '✅ 已加载 ' + IDX.length + ' 个索引段落（IELTS 4–20，共17册）';
      return;
    }
  } catch(e) {}
  
  // Decompress from inline data
  try {
    const bin = atob(GZ_B64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const ds = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    writer.write(bytes); writer.close();
    const chunks = [];
    const reader = ds.readable.getReader();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((a, b) => a + b.length, 0);
    const merged = new Uint8Array(total);
    let offset = 0;
    for (const chunk of chunks) { merged.set(chunk, offset); offset += chunk.length; }
    const text = new TextDecoder().decode(merged);
    IDX = JSON.parse(text);
    document.getElementById('notice').textContent = '✅ 已加载 ' + IDX.length + ' 个索引段落（IELTS 4–20，共17册）';
    // Cache in storage
    try { await window.storage.set('ielts_idx_v2', JSON.stringify(IDX)); } catch(e) {}
  } catch(e) {
    document.getElementById('notice').textContent = '⚠️ 索引加载失败: ' + e.message;
  }
}

function tok(t){return t.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff ]/g,' ').split(/\s+/).filter(w=>w.length>1)}

function srch(q, k=8){
  if (!IDX || !IDX.length) return [];
  const qt = tok(q);
  if (!qt.length) return IDX.slice(0, k);
  return IDX.map(c => {
    const ct = tok(c.t), cs = new Set(ct);
    let s = 0;
    const bl = c.b.toLowerCase();
    qt.forEach(w => {
      if (bl.includes(w.replace(/ielts/,''))) s += 10;
      if (cs.has(w)) s += 2;
      s += ct.filter(x => x === w).length * 0.3;
      if (c.t.toLowerCase().includes(w)) s += 0.5;
    });
    return {c, s};
  }).filter(x => x.s > 0).sort((a,b) => b.s - a.s).slice(0, k).map(x => x.c);
}

function sq(t){document.getElementById('qi').value = t}

async function ask(){
  const q = document.getElementById('qi').value.trim();
  if (!q) return;
  const btn = document.getElementById('ab'); btn.disabled = true;
  const ar = document.getElementById('ar');
  ar.innerHTML = '<div class="ans"><div class="txt"><span class="sp"></span>检索中...</div></div>';
  try {
    const hits = srch(q);
    const ctx = hits.map(c => '[' + c.b + ']\n' + c.t).join('\n\n---\n\n');
    const srcs = [...new Set(hits.map(c => c.b))];
    const sys = 'You are a Cambridge IELTS expert covering books 4-20. Answer in the same language as the question (Chinese or English). Be specific and cite which book content is from. When summarizing topics across books, be comprehensive.';
    const msg = ctx ? 'Based on these Cambridge IELTS excerpts:\n\n' + ctx + '\n\n---\nQuestion: ' + q : 'Cambridge IELTS (books 4-20) question: ' + q;
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:sys,messages:[{role:'user',content:msg}]})
    });
    const d = await r.json();
    const ans = d.content?.[0]?.text || '无回答';
    const note = hits.length ? '检索到 ' + srcs.length + ' 本书的 ' + hits.length + ' 个段落' : '未找到相关段落，使用通用知识';
    const chips = srcs.map(s => '<span class="chip">' + s + '</span>').join('');
    ar.innerHTML = '<div class="ans"><div class="meta">' + note + '</div><div class="txt">' + ans.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') + '</div><div class="chips">' + chips + '</div></div>';
  } catch(e) {
    ar.innerHTML = '<div class="ans"><div class="txt" style="color:var(--color-text-danger)">错误: ' + e.message + '</div></div>';
  }
  btn.disabled = false;
}

document.getElementById('qi').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) ask();
});

loadIndex();
</script>
